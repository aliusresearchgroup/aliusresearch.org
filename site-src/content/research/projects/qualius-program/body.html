<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .floating-nav {
            position: fixed;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            background: rgba(46, 92, 61, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .nav-btn {
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            color: white;
            text-decoration: none;
        }

        .nav-btn.active {
            background: white;
            color: #2d5a3d;
        }

        @media (max-width: 768px) {
            .floating-nav {
                left: 10px;
                padding: 8px;
                border-radius: 20px;
                gap: 3px;
            }
            
            .nav-btn {
                padding: 8px 12px;
                font-size: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .floating-nav {
                left: 5px;
                gap: 2px;
                padding: 5px;
            }
            
            .nav-btn {
                padding: 6px 10px;
                font-size: 0.7rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <nav class="floating-nav">
        <a href="#arrival" class="nav-btn">Arrival</a>
        <a href="#day1" class="nav-btn">Day 1</a>
        <a href="#day2" class="nav-btn">Day 2</a>
        <a href="#day3" class="nav-btn">Day 3</a>
        <a href="#departure" class="nav-btn">Departure</a>
    </nav>

    <script>
        // Smooth scroll functionality
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                const targetElement = document.getElementById(targetId);
                
                if (targetElement) {
                    targetElement.scrollIntoView({ 
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
                
                // Update active state
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Update active button on scroll
        window.addEventListener('scroll', () => {
            const sections = ['arrival', 'day1', 'day2', 'day3', 'departure'];
            const navButtons = document.querySelectorAll('.nav-btn');
            
            let current = '';
            sections.forEach(section => {
                const element = document.getElementById(section);
                if (element) {
                    const rect = element.getBoundingClientRect();
                    if (rect.top <= 150) {
                        current = section;
                    }
                }
            });
            
            navButtons.forEach((btn, index) => {
                btn.classList.remove('active');
                if (current === sections[index]) {
                    btn.classList.add('active');
                }
            });
        });
    </script>
