<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ALIUS Bulletin Citation</title>
  <style>
    body {
      background: #f6f8f7;
      color: #202a26;
      font: 16px/1.5 Arial, Helvetica, sans-serif;
      margin: 0;
    }
    main {
      box-sizing: border-box;
      margin: 40px auto;
      max-width: 920px;
      padding: 0 20px;
    }
    h1 {
      color: #2f382f;
      font-size: 22px;
      line-height: 1.2;
      margin: 0 0 16px;
    }
    pre {
      background: #fff;
      border: 1px solid #dbe4dc;
      border-radius: 6px;
      color: #1f2c26;
      font: 14px/1.55 "Courier New", Courier, monospace;
      margin: 0;
      overflow: auto;
      padding: 18px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main>
    <h1 id="citation-heading">Citation</h1>
    <pre id="citation-text">Citation unavailable.</pre>
  </main>
  <script>
    (function() {
      var labels = {
        bibtex: 'BibTeX',
        ris: 'RIS',
        endnote: 'EndNote'
      };
      var query = new URLSearchParams(window.location.search);
      var hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      var format = (query.get('format') || '').toLowerCase();
      var label = labels[format] || 'Citation';
      var citation = hash.get('citation') || 'Citation unavailable.';
      document.title = label + ' citation - ALIUS Bulletin';
      document.getElementById('citation-heading').textContent = label;
      document.getElementById('citation-text').textContent = citation;
    })();
  </script>
</body>
</html>
